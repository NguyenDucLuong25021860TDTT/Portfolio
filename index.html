<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Đức Lương | Portfolio</title>
    
    <!-- Font Awesome cho Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= BIẾN CSS DÀNH CHO THEME ================= */
        :root {
            /* Light Mode (Mặc định) */
            --bg-color: #ffffff; 
            --bg-secondary: #ffffff; 
            --hero-bg: #fdf5f5; 
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --primary-color: #ef4444; 
            --primary-hover: #dc2626;
            --border-color: #e5e7eb;
            --card-bg: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --logo-color: #D4AF37; /* Màu vàng đồng cho logo ở Light Mode */
        }

        [data-theme="dark"] {
            /* Dark Mode */
            --bg-color: #111827;
            --bg-secondary: #1f2937;
            --hero-bg: #111827; 
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary-color: #ef4444; 
            --primary-hover: #f87171;
            --border-color: #374151;
            --card-bg: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.5);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.5);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
            --logo-color: #D4AF37; /* Giữ màu vàng đồng cho logo ở Dark Mode */
        }

        /* ================= CƠ BẢN ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth; /* Smooth scroll khi click menu */
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Times New Roman', Times, serif;
            font-weight: 700;
            color: var(--text-main);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        section {
            padding: 100px 0;
        }

        /* ================= BUTTONS ================= */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 8px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-outline:hover {
            background-color: var(--primary-color);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* ================= HEADER & NAV ================= */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 0;
            z-index: 1000;
            transition: all 0.3s ease;
            background-color: transparent;
        }

        header.scrolled {
            background-color: var(--bg-color);
            box-shadow: var(--shadow-sm);
            padding: 15px 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--logo-color); /* Sử dụng biến màu động đã chỉnh thành vàng đồng */
            transition: color 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            transition: color 0.3s;
            margin-left: 20px;
        }

        .theme-toggle:hover {
            color: var(--primary-color);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-main);
            cursor: pointer;
        }

        /* ================= 1. HERO SECTION ================= */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: var(--hero-bg); 
            position: relative;
            overflow: hidden;
        }

        [data-theme="dark"] .hero {
            background-color: var(--hero-bg);
        }

        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image img {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid var(--bg-color);
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 2;
        }

        .hero-image::before {
            content: '';
            position: absolute;
            width: 370px;
            height: 370px;
            background-color: var(--primary-color);
            border-radius: 50%;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.1;
            z-index: 1;
        }

        .hero-text {
            flex: 1;
        }

        .hero-greeting {
            font-size: 1.2rem;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .hero-name {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .hero-tagline {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .hero-btns {
            display: flex;
            gap: 15px;
        }

        /* ================= 2. ABOUT SECTION ================= */
        .about {
            background-color: var(--bg-color); 
        }
        .about-content-wrapper {
            max-width: 800px; 
            margin: 0 auto;
            text-align: center; 
        }

        .about-text p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .about-badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
        }

        .badge-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border: 1px solid var(--border-color);
            border-radius: 50px; 
            background-color: var(--bg-secondary);
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .badge-item i {
            color: var(--text-main); 
        }

        .badge-item:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .badge-item:hover i {
            color: var(--primary-color);
        }

        /* ================= 3. PROJECTS SECTION ================= */
        .projects {
            background-color: var(--bg-color);
        }

        [data-theme="dark"] .projects {
             background-color: var(--bg-color);
        }

        #projects .section-title {
            color: var(--text-main);
        }

        #projects .section-title::after {
            background-color: #f97316; 
            width: 40px;
            height: 3px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .project-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-5px);
        }

        .project-img-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #f1f5f9; 
        }

        .project-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.5s ease;
        }

        .project-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 58, 138, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover .project-img-wrapper img {
            transform: scale(1.05);
        }

        .project-card:hover .project-overlay {
            opacity: 1;
        }

        .btn-view-evidence {
            background-color: var(--primary-color); 
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 25px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: 600;
            font-size: 0.95rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
            cursor: pointer;
        }

        .btn-view-evidence:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .project-card:hover .btn-view-evidence {
            transform: translateY(0);
            opacity: 1;
        }

        .project-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .project-title {
            font-size: 1.2rem;
            color: #1e3a8a; 
            margin-bottom: 15px;
            line-height: 1.4;
            font-family: 'Times New Roman', Times, serif;
            font-weight: 700;
        }

        [data-theme="dark"] .project-title {
            color: #60a5fa; 
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 25px;
            flex-grow: 1;
            line-height: 1.6;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background-color: #e0e7ff; 
            color: #1e40af; 
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        [data-theme="dark"] .tag {
            background-color: rgba(30, 58, 138, 0.4);
            color: #bfdbfe;
        }

        /* ================= 4. CONCLUSIONS SECTION ================= */
        .conclusions {
            background-color: var(--bg-secondary);
        }

        .conclusions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .conclusion-card {
            background-color: var(--card-bg);
            padding: 40px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* Lớp CSS cho viền full Cam (Phần 1) */
        .card-orange-full {
            border: 2px solid #f97316;
            border-radius: 20px;
        }

        /* Lớp CSS cho viền full Xanh (Phần 2) */
        .card-blue-full {
            border: 2px solid #1e3a8a;
            border-radius: 20px;
        }

        [data-theme="dark"] .card-blue-full {
            border-color: #60a5fa;
        }

        .orange-title {
            color: #f97316 !important;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .blue-title {
            color: #1e3a8a !important;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        [data-theme="dark"] .blue-title {
            color: #60a5fa !important;
        }

        .conclusion-list {
            list-style: none;
            padding-left: 0;
        }

        .conclusion-list li {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .conclusion-list li:last-child {
            margin-bottom: 0;
        }

        /* Dấu tích màu vàng (#eab308) */
        .checkmark {
            color: #eab308;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 12px;
            line-height: 1.3;
            flex-shrink: 0;
        }

        .branch-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .branch-item h4 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        /* ================= FOOTER ================= */
        footer {
            background-color: var(--bg-secondary);
            padding: 80px 0 40px;
            text-align: center;
        }

        .contact-form-container {
            background-color: var(--card-bg);
            max-width: 600px;
            margin: 0 auto 50px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            background-color: transparent;
            transition: border-color 0.3s;
        }

        [data-theme="dark"] .form-control {
            border-color: #475569;
            color: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .footer-copyright {
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ================= RESPONSIVE (MOBILE & TABLET) ================= */
        @media (max-width: 992px) {
            .hero-name { font-size: 3rem; }
            .hero-image img { width: 300px; height: 300px; }
            .hero-image::before { width: 320px; height: 320px; }
            .projects-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background-color: var(--bg-color);
                flex-direction: column;
                justify-content: center;
                gap: 40px;
                transition: 0.3s ease;
                z-index: 999;
                box-shadow: var(--shadow-md);
            }

            .nav-links.active {
                left: 0;
            }

            .mobile-menu-btn {
                display: block;
            }

            .hero-content {
                flex-direction: column-reverse;
                text-align: center;
                justify-content: center;
                padding-top: 80px;
            }

            .hero-btns {
                justify-content: center;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .branch-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER NAVIGATION -->
    <header id="header">
        <div class="container nav-container">
            <a href="#" class="logo">A+</a>
            
            <nav class="nav-links" id="navLinks">
                <a href="#hero">Trang chủ</a>
                <a href="#about">Về tôi</a>
                <a href="#projects">Dự án</a>
                <a href="#conclusions">Tổng kết</a>
            </nav>

            <div style="display: flex; align-items: center;">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- 1. HERO SECTION -->
        <section id="hero" class="hero">
            <div class="container hero-content">
                <div class="hero-image">
                    <!-- Đã thêm link ảnh dự phòng trường hợp chưa có file avatar.jpg -->
                    <img src="avatar.jpg" alt="Nguyễn Đức Lương" onerror="this.src='https://ui-avatars.com/api/?name=Nguyễn+Đức+Lương&size=350&background=ef4444&color=fff'">
                </div>
                <div class="hero-text">
                    <span class="hero-greeting">Xin chào, tôi là</span>
                    <h1 class="hero-name">Nguyễn Đức Lương</h1>
                    <h2 class="hero-tagline">Biến ý tưởng thành sản phẩm số chuyên nghiệp</h2>
                    <div class="hero-btns">
                        <a href="#projects" class="btn btn-primary">Xem dự án</a>
                        <a href="#footer" class="btn btn-outline">Liên hệ ngay</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. ABOUT ME SECTION -->
        <section id="about" class="about">
            <div class="container">
                <h2 class="section
